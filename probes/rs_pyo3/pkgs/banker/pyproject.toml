[project]
name = "banker"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "click>=8.4.2",
    "greet",
    "nuitka>=4.1.3",
    "textual>=8.2.8",
]

[project.scripts]
banker = ".main:main"

[tool.uv.sources]
greet = { workspace = true }

# This would be used by `nuitka --project`
# However Nuitka doesn't yet support this feature (See https://github.com/Nuitka/Nuitka/issues/3909)
# Then we instead rely on inline args defined in ./Justfile
